spring:
  profiles:
    active: "@spring.profiles.active@"
  data:
    mongodb:
      uri: mongodb://localhost:27017/dokokasse
  threads:
    virtual:
      enabled: true

springdoc:
  api-docs:
    path: "/api-docs"
  swagger-ui:
    path: "/api-ui"

server:
  port: 8080
  error:
    include-message: always
  servlet:
    context-path: /api/v1
